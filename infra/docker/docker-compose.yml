version: '3.9'
services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: shadowdistricts
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - '6379:6379'

  game-api:
    image: node:20-alpine
    working_dir: /app
    command: sh -c "npm install && npm run prisma:generate && npm run start:dev"
    env_file:
      - ../../services/game-api/.env.example
    ports:
      - '3000:3000'
    volumes:
      - ../../services/game-api:/app
    depends_on:
      - postgres
      - redis

volumes:
  postgres_data:
